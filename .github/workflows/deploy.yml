name: Deploy to Cloud Run

on:
  release:
    types: [created]

permissions:
  contents: read

env:
  IMAGE: gcr.io/anchildress1/architect-of-suspicion

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet gcr.io

      - name: Build Docker image
        run: docker build -t "$IMAGE:$RELEASE_TAG" .

      - name: Push Docker image
        run: docker push "$IMAGE:$RELEASE_TAG"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy architect-of-suspicion \
            --image "$IMAGE:$RELEASE_TAG" \
            --region us-central1 \
            --allow-unauthenticated
